<div *ngIf="visible"
     class="absolute bottom-5 right-5 w-72 bg-white border border-gray-200 shadow-xl rounded-xl p-4">

  <!-- Close Button -->
  <button
    (click)="close()"
    class="absolute top-2 right-2 text-gray-400 hover:text-gray-700 text-sm">
    ✕
  </button>

  <!-- Content -->
  <h3 class="font-semibold text-gray-800 mb-1">
    {{ tooltips[currentIndex].title }}
  </h3>

  <p class="text-sm text-gray-600 mb-4">
    {{ tooltips[currentIndex].description }}
  </p>

  <!-- Footer -->
  <div class="flex justify-between items-center">

    <span class="text-xs text-gray-400">
      {{currentIndex + 1}} / {{tooltips.length}}
    </span>

    <!-- Next Button -->
    <button
      (click)="nextTooltip()"
      class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-800">

      Next
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-4 h-4"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"/>
      </svg>

    </button>

  </div>

</div>
