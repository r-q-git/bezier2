<div
  class="fixed top-0 left-1/2 transform -translate-x-1/2 z-50 m-3 py-2 px-1 rounded-lg flex items-center justify-center gap-2 mx-2 bg-white border h-12 border-gray-300 shadow-xl"
  (mousedown)="$event.stopPropagation()"
  (dblclick)="$event.stopPropagation()"
  *ngIf="selectedLine"
>
  <div class="flex items-center justify-center gap-5">
    <img
      title="Line Width"
      class="cursor-pointer p-1 h-8 hover:bg-[#f6f9fb] hover:border rounded-md"
      [src]="linemenu ? '/assets/linewidth2.svg' : '/assets/linewidth.svg'"
      (click)="linemenu = !linemenu"
      (mousedown)="$event.stopPropagation()"
    />

    <div
      *ngIf="linemenu"
      title="Line Width"
      class="absolute top-10 left-1 mt-3 px-4 py-3 min-w-44 flex flex-col items-start justify-center gap-3 rounded-md bg-white border shadow shadow-[#f6f9fb]"
      (mousedown)="$event.stopPropagation()"
    >
      <div class="flex flex-col items-start justify-center gap-2 w-full">
        <span class="text-xs font-semibold" title="Stroke Style"
          >Stroke Style</span
        >
        <div class="flex items-start justify-between w-full">
          <button
            title="Stroke Style : Solid"
            class="w-9 h-9 p-1 flex items-center justify-center shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            (click)="selectedLine.strokeStyle = 'solid'"
            [ngClass]="
              selectedLine.strokeStyle == 'solid'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <line
                x2="24"
                y1="50%"
                y2="50%"
                stroke="currentColor"
                stroke-width="2"
                shape-rendering="crispEdges"
              ></line>
            </svg>
          </button>
          <button
            title="Stroke Style : Dashed"
            class="w-9 h-9 p-1 flex items-center justify-center shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            (click)="selectedLine.strokeStyle = 'dashed'"
            [ngClass]="
              selectedLine.strokeStyle == 'dashed'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <line
                x1="1"
                x2="23"
                y1="50%"
                y2="50%"
                stroke="currentColor"
                stroke-dasharray="6 2"
                stroke-width="2"
                shape-rendering="crispEdges"
              ></line>
            </svg>
          </button>
          <button
            title="Stroke Style : Dotted"
            class="w-9 h-9 p-1 flex items-center justify-end shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            (click)="selectedLine.strokeStyle = 'dotted'"
            [ngClass]="
              selectedLine.strokeStyle == 'dotted'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <line
                x1="2"
                x2="22"
                y1="50%"
                y2="50%"
                stroke="currentColor"
                stroke-width="3"
                stroke-dasharray="0 6"
                stroke-linecap="round"
              ></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="flex flex-col items-start justify-center gap-3 w-full">
        <span class="text-xs font-semibold">Line Width</span>
        <div class="flex items-center justify-center gap-2">
          <input
            type="range"
            step="1"
            min="2"
            [title]="'Line Width : ' + selectedLine.width"
            [(ngModel)]="selectedLine.width"
            [style.accentColor]="'#ff9100'"
            class="w-full h-2 cursor-pointer appearance-none rounded-lg border shadow-sm [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
          />

          <input
            type="number"
            step="1"
            min="2"
            [title]="'Line Width : ' + selectedLine.width"
            [(ngModel)]="selectedLine.width"
            class="w-9 h-8 p-1 text-center text-sm no-spinners rounded-md border shadow shadow-[#f6f9fb] [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none [&::-webkit-outer-spin-button]:appearance-none"
          />
        </div>
      </div>

      <div class="flex flex-col items-start justify-center gap-2 w-full">
        <span class="text-xs font-semibold">Line Cap</span>

        <div class="flex items-center justify-between w-full">
          <button
            class="w-9 h-9 p-1 flex items-center justify-center shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            title="Line Cap : Square"
            (click)="selectedLine.linecap = 'square'"
            [ngClass]="
              selectedLine.linecap == 'square'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg width="40" height="40" viewBox="0 0 40 40">
              <line
                x1="10"
                y1="20"
                x2="30"
                y2="20"
                stroke="currentColor"
                stroke-width="5"
                stroke-linecap="square"
              />
            </svg>
          </button>
          <button
            class="w-9 h-9 p-1 flex items-center justify-center shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            *ngIf="selectedLine.strokeStyle != 'dotted'"
            title="Line Cap : Butt"
            (click)="selectedLine.linecap = 'butt'"
            [ngClass]="
              selectedLine.linecap == 'butt'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg width="40" height="40" viewBox="0 0 40 40">
              <line
                x1="10"
                y1="20"
                x2="30"
                y2="20"
                stroke="currentColor"
                stroke-width="5"
                stroke-linecap="butt"
              />
            </svg>
          </button>
          <button
            class="w-9 h-9 p-1 flex items-center justify-center shadow cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md"
            title="Line Cap : Round"
            (click)="selectedLine.linecap = 'round'"
            [ngClass]="
              selectedLine.linecap == 'round'
                ? 'border border-[#ff9100] text-[#ff9100]'
                : 'text-black'
            "
          >
            <svg width="40" height="40" viewBox="0 0 40 40">
              <line
                x1="10"
                y1="20"
                x2="30"
                y2="20"
                stroke="currentColor"
                stroke-width="5"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div
    class="relative flex items-center justify-center h-8 w-8 rounded-md hover:bg-[#f6f9fb] hover:border"
  >
    <div
      class="w-6 h-6 border-2 cursor-pointer transition-all flex items-center justify-center rounded-full"
      [style.backgroundColor]="selectedLine.color"
      [style.borderColor]="isColorPickerOpen ? '#ff9100' : '#e5e7eb'"
      (click)="openColorPicker(colorInput)"
      title="Change Color"
    ></div>

    <input
      #colorInput
      type="color"
      class="absolute top-5 opacity-0 w-full h-full cursor-pointer"
      [(ngModel)]="selectedLine.color"
      (change)="isColorPickerOpen = false"
      (mousedown)="$event.stopPropagation()"
    />
  </div>

  <div
    *ngIf="selectedLine.type !== 'linear'"
    class="relative flex items-center justify-center h-8 w-8 rounded-md hover:bg-[#f6f9fb] hover:border"
  >
    <div
      class="w-6 h-6 border-2 cursor-pointer transition-all flex items-center justify-center rounded-full"
      [style.backgroundColor]="selectedLine.fill"
      [style.borderColor]="isFillColorPickerOpen ? '#ff9100' : '#e5e7eb'"
      (click)="openFillColorPicker(fillColorInput)"
      title="Change Fill Color"
    ></div>
    <input
      #fillColorInput
      type="color"
      class="absolute top-5 opacity-0 w-full h-full cursor-pointer disabled:cursor-not-allowed"
      [(ngModel)]="selectedLine.fill"
      (change)="isFillColorPickerOpen = false"
      (mousedown)="$event.stopPropagation()"
    />
  </div>
  <div
    (click)="duplicateLine($event, selectedLine)"
    class="w-8 h-8 bg-white flex items-center justify-center transition-transform cursor-pointer hover:bg-[#f6f9fb] hover:border rounded-md hover:text-[#ff9100]"
    title="Duplicate"
    (mousedown)="$event.stopPropagation()"
  >
    <svg
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      (mousedown)="$event.stopPropagation()"
    >
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>
  </div>

  <div
    title="Delete"
    class="cursor-pointer p-1 h-8 w-8 rounded-md hover:bg-[#f6f9fb] hover:border hover:fill-[#ff9100]"
    (click)="removeWholeLine($event, selectedLine.id)"
    (mousedown)="$event.stopPropagation()"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      height="24px"
      viewBox="0 -960 960 960"
      width="24px"
      class=""
    >
      <path
        d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"
      />
    </svg>
  </div>
</div>
