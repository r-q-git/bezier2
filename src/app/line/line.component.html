<div class="flex h-screen bg-slate-50 p-6 gap-6 font-sans select-none">
  <aside
    class="w-72 bg-white p-5 rounded-2xl shadow-xl border border-slate-200 overflow-y-auto"
  >
    <h3
      class="text-slate-500 text-[10px] font-bold tracking-widest mb-3 uppercase"
    >
      Draw
    </h3>
    <div class="grid grid-cols-1 gap-2 mb-6">
      <button
        (click)="addLine('linear')"
        class="bg-slate-800 text-white p-2 rounded text-sm"
      >
        + Linear
      </button>
      <button
        (click)="addLine('quadratic')"
        class="bg-blue-600 text-white p-2 rounded text-sm"
      >
        + Quadratic
      </button>
      <button
        (click)="addLine('cubic')"
        class="bg-indigo-600 text-white p-2 rounded text-sm"
      >
        + Cubic
      </button>
    </div>

    <div *ngIf="selectedLines.length > 0" class="border-t pt-4 space-y-4">
      <h3
        class="text-slate-500 text-[10px] font-bold tracking-widest uppercase"
      >
        Selection
      </h3>

      <button
        (click)="deleteSelected()"
        class="w-full bg-red-50 text-red-600 py-2 rounded text-xs font-bold border border-red-100"
      >
        DELETE SELECTED
      </button>

      <div *ngIf="selectedLine" class="space-y-3 pt-2">
        <label class="block text-[10px] font-bold text-slate-400"
          >COLOR & STROKE</label
        >
        <input
          type="color"
          [(ngModel)]="selectedLine.color"
          class="w-full h-8 cursor-pointer"
        />
        <input
          type="range"
          min="1"
          max="20"
          [(ngModel)]="selectedLine.width"
          class="w-full"
        />

        <label class="block text-[10px] font-bold text-slate-400">FILL</label>
        <div class="flex gap-2">
          <input
            type="color"
            [ngModel]="
              selectedLine.fill === 'none' ? '#ffffff' : selectedLine.fill
            "
            (ngModelChange)="selectedLine.fill = $event"
            class="flex-1 h-8"
          />
          <button
            (click)="clearFill()"
            class="px-2 bg-slate-100 rounded text-[10px]"
          >
            NONE
          </button>
        </div>

        <div
          class="flex items-center justify-between p-2 bg-slate-50 rounded-lg border border-slate-100"
        >
          <label class="text-[10px] font-bold text-slate-500 uppercase"
            >Closed Path</label
          >
          <input
            type="checkbox"
            [(ngModel)]="selectedLine.isClose"
            class="w-4 h-4 accent-indigo-600"
          />
        </div>
        <div class="grid grid-cols-2 gap-2 mb-6">
          <button
            (click)="exportToSVG()"
            class="bg-emerald-600 text-white p-2 rounded text-sm"
          >
            Export SVG
          </button>

          <button
            (click)="triggerUpload()"
            class="bg-orange-500 text-white p-2 rounded text-sm"
          >
            Import SVG
          </button>
        </div>

        <input
          id="svgUpload"
          type="file"
          accept=".svg"
          hidden
          (change)="onFileSelected($event)"
        />
      </div>
    </div>
  </aside>

  <main
    class="flex-1 relative bg-white rounded-2xl shadow-inner border border-slate-200 overflow-hidden"
    (mousedown)="deselectAll($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="stopAll()"

    (dblclick)="onCanvasDoubleClick($event)"
  >
    <svg id="canvas-svg" class="w-full h-full relative z-10">
      <rect width="100%" height="100%" fill="transparent" />
      <g *ngFor="let line of lines">
        <path
          *ngFor="let segD of getSegmentPaths(line); let segIdx = index"
          [attr.d]="segD"
          stroke="transparent"
          stroke-width="25"
          fill="none"
          [class.pointer-events-auto]="isShiftPressed"
          class="cursor-crosshair"
          (mousedown)="
            startSegmentDrag(
              $event,
              line,
              segIdx * (line.type === 'quadratic' ? 2 : 3)
            )
          "
        />

        <path
          [attr.d]="getComplexPath(line)"
          stroke="transparent"
          stroke-width="25"
          fill="none"
          [class.pointer-events-auto]="!isShiftPressed"
          class="cursor-move"
          (mousedown)="selectLine(line, $event); startLineDrag($event, line)"
        />

        <path
          [attr.d]="getComplexPath(line)"
          [attr.stroke]="line.selected ? '#4f46e5' : line.color"
          [attr.stroke-width]="line.width"
          [attr.fill]="line.fill"
          fill-rule="evenodd"
        />
      </g>
      <circle
        *ngIf="isShiftPressed"
        [attr.cx]="mouseCanvasPos.x"
        [attr.cy]="mouseCanvasPos.y"
        r="10"
        fill="white"
        stroke="#4f46e5"
        stroke-width="2"
        class="pointer-events-none shadow-xl"
      />
    </svg>

    <ng-container *ngIf="selectedLines.length > 0">
      <div
        class="absolute border border-dashed border-indigo-400 z-20 pointer-events-auto"
        [ngStyle]="getCombinedBounds()"
        (mousedown)="startLineDrag($event, selectedLines[0])"
      >
        <button
          (mousedown)="startRotate($event, selectedLines[0])"
          class="absolute -top-10 left-1/2 -translate-x-1/2 w-8 h-8 bg-white rounded-full shadow-md border border-slate-200 flex items-center justify-center cursor-alias"
        >
          <span class="text-indigo-600 font-bold">↻</span>
        </button>
      </div>
    </ng-container>

    <div *ngIf="selectedLines.length === 1">
      <div
        *ngFor="let pt of selectedLines[0].points; let i = index"
        [style.left.px]="pt.x - 6"
        [style.top.px]="pt.y - 6"
        (mousedown)="
          activePoint = { lineId: selectedLines[0].id, index: i };
          $event.stopPropagation()
        "
        class="absolute w-3 h-3 rounded-full border border-white shadow bg-indigo-600 z-30 cursor-move"
      ></div>
    </div>
  </main>
</div>
